version: "3.9"

x-backend-build: &backend_build
  context: ..
  dockerfile: docker/Dockerfile.backend

x-backend-env: &backend_env
  PROJECT_SLUG: ${PROJECT_SLUG:-charaforge-t2i-lab}
  # AI warehouse roots (in-container)
  AI_MODELS_ROOT: /data/models
  AI_CACHE_ROOT: /data/cache
  AI_DATASETS_ROOT: /data/datasets
  AI_TRAINING_ROOT: /data/training
  # Keep caches inside the shared warehouse volume
  XDG_CACHE_HOME: /data/cache
  HF_HOME: /data/cache/huggingface
  TRANSFORMERS_CACHE: /data/cache/huggingface
  TORCH_HOME: /data/cache/torch
  # Container networking
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}

x-backend-volumes: &backend_volumes
  # Use bind mounts by setting *_HOST in docker/.env (or fall back to named volumes).
  - ${AI_MODELS_ROOT_HOST:-ai_models_data}:/data/models
  - ${AI_CACHE_ROOT_HOST:-ai_cache_data}:/data/cache
  - ${AI_DATASETS_ROOT_HOST:-ai_datasets_data}:/data/datasets
  - ${AI_TRAINING_ROOT_HOST:-ai_training_data}:/data/training

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      <<: *backend_build
    environment:
      <<: *backend_env
      # Avoid embedded worker threads inside the API container (use dedicated worker services).
      API_T2I_WORKER_ENABLED: "false"
      API_MODELS_SCAN_WORKER_ENABLED: "false"
      # T2I dispatch:
      # - redis (default): use `t2i_worker` (python -m api.t2i_worker)
      # - celery: use `t2i_celery_worker` (queue=t2i)
      API_T2I_DISPATCH_MODE: ${API_T2I_DISPATCH_MODE:-redis}
    volumes:
      *backend_volumes
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      <<: *backend_build
    environment:
      <<: *backend_env
    volumes:
      *backend_volumes
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=INFO --queues=training --concurrency=1

  t2i_worker:
    build:
      <<: *backend_build
    environment:
      <<: *backend_env
      API_T2I_WORKER_ENABLED: "true"
      API_T2I_DISPATCH_MODE: redis
    volumes:
      *backend_volumes
    depends_on:
      redis:
        condition: service_healthy
    command: python -m api.t2i_worker

  t2i_celery_worker:
    profiles: ["celery"]
    build:
      <<: *backend_build
    environment:
      <<: *backend_env
      API_T2I_DISPATCH_MODE: celery
    volumes:
      *backend_volumes
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=INFO --queues=t2i --concurrency=1

  models_scan_worker:
    build:
      <<: *backend_build
    environment:
      <<: *backend_env
    volumes:
      *backend_volumes
    depends_on:
      redis:
        condition: service_healthy
    command: python -m api.model_scan_worker

  react:
    profiles: ["frontend"]
    image: node:18-alpine
    working_dir: /app/frontend/react_app
    volumes:
      - ..:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  redis_data:
  ai_models_data:
  ai_cache_data:
  ai_datasets_data:
  ai_training_data:
