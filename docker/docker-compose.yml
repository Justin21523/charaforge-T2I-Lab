version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      # AI_WAREHOUSE 3.0
      - PROJECT_SLUG=charaforge-t2i-lab
      - AI_MODELS_ROOT=/mnt/c/ai_models
      - AI_CACHE_ROOT=/mnt/c/ai_cache
      - AI_DATASETS_ROOT=/mnt/data/datasets
      - AI_TRAINING_ROOT=/mnt/data/training
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_CORS_ORIGINS=http://localhost:3000
      # T2I dispatch:
      # - redis (default): use `t2i_worker` (python -m api.t2i_worker)
      # - celery: use `t2i_celery_worker` (queue=t2i)
      - API_T2I_DISPATCH_MODE=${API_T2I_DISPATCH_MODE:-redis}
    volumes:
      - /mnt/c/ai_models:/mnt/c/ai_models
      - /mnt/c/ai_cache:/mnt/c/ai_cache
      - /mnt/data:/mnt/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - PROJECT_SLUG=charaforge-t2i-lab
      - AI_MODELS_ROOT=/mnt/c/ai_models
      - AI_CACHE_ROOT=/mnt/c/ai_cache
      - AI_DATASETS_ROOT=/mnt/data/datasets
      - AI_TRAINING_ROOT=/mnt/data/training
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - /mnt/c/ai_models:/mnt/c/ai_models
      - /mnt/c/ai_cache:/mnt/c/ai_cache
      - /mnt/data:/mnt/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=INFO --queues=training --concurrency=1

  t2i_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - PROJECT_SLUG=charaforge-t2i-lab
      - AI_MODELS_ROOT=/mnt/c/ai_models
      - AI_CACHE_ROOT=/mnt/c/ai_cache
      - AI_DATASETS_ROOT=/mnt/data/datasets
      - AI_TRAINING_ROOT=/mnt/data/training
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_T2I_WORKER_ENABLED=true
      - API_T2I_DISPATCH_MODE=redis
    volumes:
      - /mnt/c/ai_models:/mnt/c/ai_models
      - /mnt/c/ai_cache:/mnt/c/ai_cache
      - /mnt/data:/mnt/data
    depends_on:
      redis:
        condition: service_healthy
    command: python -m api.t2i_worker

  t2i_celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - PROJECT_SLUG=charaforge-t2i-lab
      - AI_MODELS_ROOT=/mnt/c/ai_models
      - AI_CACHE_ROOT=/mnt/c/ai_cache
      - AI_DATASETS_ROOT=/mnt/data/datasets
      - AI_TRAINING_ROOT=/mnt/data/training
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_T2I_DISPATCH_MODE=celery
    volumes:
      - /mnt/c/ai_models:/mnt/c/ai_models
      - /mnt/c/ai_cache:/mnt/c/ai_cache
      - /mnt/data:/mnt/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=INFO --queues=t2i --concurrency=1

  react:
    image: node:18-alpine
    working_dir: /app/frontend/react_app
    volumes:
      - ..:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  redis_data:
