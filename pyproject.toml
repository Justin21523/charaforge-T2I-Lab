[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".git",
  ".pytest_cache",
  "frontend/react_app/node_modules",
  "frontend/react_app/dist",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["api", "core", "workers", "tests"]
